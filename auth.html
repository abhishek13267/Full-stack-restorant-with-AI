<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up | Saffron & Sage</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #fff9f0 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            max-width: 500px;
            margin: 4rem auto;
            background: white;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            animation: slideUp 0.8s ease-out;
            position: relative;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 2px solid #eee;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            color: #888;
            transition: 0.3s;
        }

        .auth-tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        .section-title {
            background: linear-gradient(to right, var(--primary), #ae6b0a);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-align: center;
            margin-bottom: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="inner-page">
    <header class="header scrolled">
        <nav class="nav container">
            <a href="index.html" class="nav-logo">
                <div class="logo-mark">
                    <img src="images/logo_gen.png" alt="Saffron & Sage Logo" class="logo-img-gen">
                    <div class="logo-container">
                        <span class="logo-title">Saffron & Sage</span>
                        <span class="logo-subtitle">Fine Dining Gastronomy</span>
                    </div>
                </div>
            </a>
            
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle Menu">
                <i class="fas fa-bars"></i>
            </button>

            <ul class="nav-list" id="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
                <li><a href="feedback.html" class="nav-link">Feedback</a></li>
                <li><a href="payment-status.html" class="nav-link">Pay Status</a></li>
                <li class="nav-cta"><button class="btn btn-primary">+91 9967253466</button></li>
            </ul>
        </nav>
    </header>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding-top: 80px;">
        <div class="container w-100">
            <div class="auth-container">
                <h2 class="section-title">Welcome Guest</h2>
                <div class="auth-tabs">
                    <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
                    <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
                </div>

                <!-- Login Form -->
                <form id="form-login" class="auth-form active">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" placeholder="abhi@example.com" required style="width:100%; padding:0.8rem; border-radius:10px; border:1px solid #ddd;">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required style="width:100%; padding:0.8rem; border-radius:10px; border:1px solid #ddd;">
                    </div>
                    <div id="login-error" style="color:var(--primary); font-size:0.9rem; margin-bottom:1rem; display:none;"></div>
                    <button type="submit" class="btn btn-primary w-100">Login <i class="fas fa-sign-in-alt"></i></button>
                </form>

                <!-- Sign Up Form -->
                <form id="form-signup" class="auth-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signup-name" placeholder="Abhishek" required minlength="2" style="width:100%; padding:0.8rem; border-radius:10px; border:1px solid #ddd;">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="signup-email" placeholder="abhi@example.com" required style="width:100%; padding:0.8rem; border-radius:10px; border:1px solid #ddd;">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" placeholder="Min 8 chars, 1 number" required minlength="8" style="width:100%; padding:0.8rem; border-radius:10px; border:1px solid #ddd;">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="signup-confirm-password" placeholder="••••••••" required style="width:100%; padding:0.8rem; border-radius:10px; border:1px solid #ddd;">
                    </div>
                    <div id="signup-error" style="color:var(--primary); font-size:0.9rem; margin-bottom:1rem; display:none;"></div>
                    <div id="signup-success" style="color:green; font-size:0.9rem; margin-bottom:1rem; display:none;"></div>
                    <button type="submit" class="btn btn-primary w-100">Create Account <i class="fas fa-user-plus"></i></button>
                </form>

                <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; text-align: center;">
                    <p style="font-size: 0.85rem; color: #888;">Are you a Manager? <a href="admin.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">Admin Access &rarr;</a></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modern JS -->
    <script src="https://kit.fontawesome.com/04111552cb.js" crossorigin="anonymous"></script>
    <script type="module" src="js/main.js"></script>
    <script>
        function switchTab(tab) {
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-signup').classList.remove('active');
            document.getElementById('form-login').classList.remove('active');
            document.getElementById('form-signup').classList.remove('active');

            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('form-' + tab).classList.add('active');
        }
    </script>
    <script type="module">
        const API_BASE = 'http://localhost:5001/api';

        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            const btn = e.target.querySelector('button');

            // Basic Validation
            if (!email || !password) {
                errorDiv.innerText = 'Please fill in all fields.';
                errorDiv.style.display = 'block';
                return;
            }

            errorDiv.style.display = 'none';
            btn.innerHTML = 'Logging in...';

            try {
                const response = await fetch(`${API_BASE}/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Login failed');

                alert('Login successful! Welcome ' + data.user.name);
                window.location.href = 'index.html'; // Redirect to home page
            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.innerHTML = 'Login <i class="fas fa-sign-in-alt"></i>';
            }
        });

        document.getElementById('form-signup').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm-password').value;
            const errorDiv = document.getElementById('signup-error');
            const successDiv = document.getElementById('signup-success');
            const btn = e.target.querySelector('button');

            // Client-side Validation
            if (name.length < 2) {
                errorDiv.innerText = 'Name must be at least 2 characters long.';
                errorDiv.style.display = 'block';
                return;
            }

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                errorDiv.innerText = 'Please enter a valid email address.';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                errorDiv.innerText = 'Password must be at least 8 characters long.';
                errorDiv.style.display = 'block';
                return;
            }

            if (!/\d/.test(password)) {
                errorDiv.innerText = 'Password must contain at least one number.';
                errorDiv.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorDiv.innerText = 'Passwords do not match.';
                errorDiv.style.display = 'block';
                return;
            }

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            btn.innerHTML = 'Creating...';

            try {
                const response = await fetch(`${API_BASE}/users/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Signup failed');

                successDiv.innerText = data.message + ' Please login.';
                successDiv.style.display = 'block';
                e.target.reset();
            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
            }
        });
    </script>
</body>
</html>
