<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | Saffron & Sage - Fine Dining Gastronomy</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: url('images/hero_gen.png') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        .admin-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 4rem;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            text-align: center;
            transform: translateY(0);
            animation: card-entrance 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes card-entrance {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .admin-logo {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .admin-logo i {
            font-size: 3rem;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 2rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dark);
            margin-bottom: 0.8rem;
        }

        .form-group input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            border: 1px solid #eee;
            border-radius: 15px;
            background: #fdfdfd;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(209, 44, 78, 0.1);
            outline: none;
        }

        #login-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            font-weight: 600;
        }

        .admin-footer {
            margin-top: 2rem;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="login-card">
            <div class="admin-logo">
                <i class="fas fa-user-shield"></i>
                <h2 style="font-weight: 900; letter-spacing: -1px;">Admin Portal</h2>
                <p style="font-size: 0.85rem; color: #888;">Secure Access for Saffron & Sage Manager</p>
            </div>

            <form id="login-form">
                <div id="login-error">Invalid Username or Password. Please try again.</div>
                
                <div class="form-group">
                    <label>Unique Username</label>
                    <input type="text" id="username" placeholder="Enter Username..." required>
                </div>

                <div class="form-group">
                    <label>Protected Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100" style="padding: 1.2rem;">Verify & Enter Portal <i class="fas fa-lock"></i></button>
            </form>
            
            <a href="index.html" style="display: block; margin-top: 2rem; font-size: 0.85rem; color: #888; text-decoration: none;">&larr; Back to Cafe Home</a>
        </div>
        
        <div class="admin-footer text-center">
            Handcrafted with Passion by Abhishek System © 2026
        </div>
    </div>

    <!-- Modern JS -->
    <script src="https://kit.fontawesome.com/04111552cb.js" crossorigin="anonymous"></script>
    <script type="module">
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('login-error');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5001/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    // Success - Show loading then redirect
                    loginForm.innerHTML = `<div style="padding: 2rem;"><i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--primary);"></i><h3 style="margin-top: 1rem;">Verifying Identity...</h3></div>`;
                    localStorage.setItem('adminToken', data.token); // Store the session token
                    setTimeout(() => {
                        alert("Welcome back, Abhishek! Redirecting to Management Dashboard...");
                        window.location.href = "dashboard.html";
                    }, 1500);
                } else {
                    throw new Error('Unauthorized');
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                // Animation Shake effect
                document.querySelector('.login-card').animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        });
    </script>
</body>
</html>
